# netlify.toml for Bolt Unblocker (works with Vite/CRA SPAs)

[build]
  # Use pnpm to install dependencies and build
  command = "pnpm install && pnpm run build"
  # Default output folder (Vite: dist, CRA: build)
  publish = "dist"
  # Pin Node version for compatibility
  environment = { NODE_VERSION = "20" }

# Redirect all SPA routes to index.html to avoid 404s
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
